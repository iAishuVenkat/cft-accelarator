type: object
required:
  - project
  - environment
  - region
  - components
properties:
  project:
    type: string
    pattern: "^[a-z][a-z0-9-]{1,30}$"
    description: "Project name (lowercase, hyphens allowed, 2-31 chars)"
  environment:
    type: string
    enum: [dev, staging, prod]
    description: "Target environment"
  region:
    type: string
    pattern: "^[a-z]{2}-[a-z]+-[0-9]$"
    description: "AWS region (e.g., us-east-1)"
  tags:
    type: object
    additionalProperties:
      type: string
    description: "Tags applied to all resources"
  components:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - vpc
            - alb
            - nlb
            - api-gateway
            - cloudfront
            - route53
            - ecs-service
            - ecs-cluster
            - lambda
            - ec2
            - auto-scaling-group
            - step-functions
            - rds
            - dynamodb
            - elasticache
            - aurora
            - s3
            - s3-static-site
            - efs
            - sqs
            - sns
            - eventbridge
            - kinesis
            - cognito
            - waf
            - secrets-manager
            - kms
            - cloudwatch-alarm
            - cloudwatch-dashboard
            - cloudtrail
            - codepipeline
            - codebuild
            - ecr
            - appsync
            - ses
            - glue
            - athena
      additionalProperties: true
